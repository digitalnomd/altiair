<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Altiair edge fusion flow</title>
  <desc id="desc">Edge nodes filter local sensor data, exchange evidence records, elect a coordinator, produce a human-reviewable cue, and sync to Foundry when connected.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #f6f7f2; }
      .box { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 12; }
      .edge { fill: #e6f0ff; stroke: #1f4b7a; stroke-width: 2; rx: 12; }
      .mesh { fill: #eaf6ec; stroke: #2f6b3f; stroke-width: 2; rx: 12; }
      .human { fill: #fff0cc; stroke: #775800; stroke-width: 2; rx: 12; }
      .foundry { fill: #f0e9ff; stroke: #4b347a; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #14212b; }
      .h1 { font-size: 34px; font-weight: 700; }
      .h2 { font-size: 22px; font-weight: 700; }
      .body { font-size: 17px; }
      .small { font-size: 14px; fill: #39464f; }
      .arrow { stroke: #263238; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6d7780; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="60" y="70" class="text h1">Altiair: local filtering, compact evidence, resilient fusion</text>

  <rect x="60" y="135" width="220" height="110" class="edge"/>
  <text x="92" y="175" class="text h2">Node A</text>
  <text x="92" y="205" class="text body">Camera filter</text>
  <text x="92" y="228" class="text small">Evidence, not raw stream</text>

  <rect x="60" y="285" width="220" height="110" class="edge"/>
  <text x="92" y="325" class="text h2">Node B</text>
  <text x="92" y="355" class="text body">Audio filter</text>
  <text x="92" y="378" class="text small">Freshness + confidence</text>

  <rect x="60" y="435" width="220" height="110" class="edge"/>
  <text x="92" y="475" class="text h2">Node C</text>
  <text x="92" y="505" class="text body">RF / RFID filter</text>
  <text x="92" y="528" class="text small">Local context</text>

  <rect x="390" y="225" width="260" height="210" class="mesh"/>
  <text x="430" y="275" class="text h2">Replicated mesh</text>
  <text x="430" y="310" class="text body">Signed evidence records</text>
  <text x="430" y="340" class="text body">Peer heartbeats</text>
  <text x="430" y="370" class="text body">Coordinator election</text>
  <text x="430" y="400" class="text body">Mission state cache</text>

  <rect x="760" y="180" width="310" height="145" class="human"/>
  <text x="800" y="225" class="text h2">Human-review cue</text>
  <text x="800" y="260" class="text body">What, where, confidence</text>
  <text x="800" y="288" class="text body">Sources + contradictions</text>

  <rect x="760" y="395" width="310" height="135" class="foundry"/>
  <text x="800" y="440" class="text h2">Palantir Foundry</text>
  <text x="800" y="475" class="text body">Ontology sync</text>
  <text x="800" y="503" class="text body">Commander visibility</text>

  <path d="M280 190 C330 210 350 250 390 280" class="arrow"/>
  <path d="M280 340 C330 340 350 340 390 340" class="arrow"/>
  <path d="M280 490 C330 465 350 420 390 390" class="arrow"/>
  <path d="M650 330 C700 310 720 275 760 250" class="arrow"/>
  <path d="M915 325 L915 395" class="dash"/>
  <text x="940" y="365" class="text small">sync when connected</text>

  <rect x="390" y="555" width="680" height="60" class="box"/>
  <text x="430" y="592" class="text body">Result: less bandwidth, less cloud dependence, no single node holding the whole mission picture.</text>
</svg>
