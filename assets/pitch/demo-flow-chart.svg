<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Altiair demo flow chart</title>
  <desc id="desc">One-command demo startup, sensor ingest, local edge filtering, replicated mesh fusion, human review, node failure recovery, and Foundry sync.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #f6f7f2; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #14212b; }
      .subtitle { font: 18px Arial, Helvetica, sans-serif; fill: #3b4850; }
      .box { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 10; }
      .cmd { fill: #e7f0ff; stroke: #1f4b7a; stroke-width: 2; rx: 10; }
      .sensor { fill: #fff7de; stroke: #775800; stroke-width: 2; rx: 10; }
      .mesh { fill: #e9f6ec; stroke: #2f6b3f; stroke-width: 2; rx: 10; }
      .review { fill: #f0e9ff; stroke: #4b347a; stroke-width: 2; rx: 10; }
      .decision { fill: #ffffff; stroke: #263238; stroke-width: 2; }
      .fail { fill: #ffe9e7; stroke: #9d302a; stroke-width: 2; rx: 10; }
      .text { font: 700 17px Arial, Helvetica, sans-serif; fill: #14212b; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #39464f; }
      .label { font: 13px Arial, Helvetica, sans-serif; fill: #39464f; }
      .line { stroke: #263238; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6f7a82; stroke-width: 2.4; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .band { fill: #eef1ea; stroke: #c8cfc3; stroke-width: 1; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="980"/>
  <text x="70" y="70" class="title">Altiair Demo Flow</text>
  <text x="70" y="104" class="subtitle">From one-command startup to edge fusion, node-loss resilience, and Foundry/CASK reconciliation.</text>

  <rect x="55" y="135" width="300" height="790" class="band"/>
  <text x="80" y="170" class="small">1. Start The Demo</text>

  <rect x="90" y="205" width="230" height="74" class="cmd"/>
  <text x="124" y="238" class="text">npm run demo:start</text>
  <text x="125" y="260" class="small">single operator command</text>

  <rect x="90" y="325" width="230" height="82" class="cmd"/>
  <text x="126" y="356" class="text">Start node API</text>
  <text x="119" y="379" class="small">altiair-orin or Pi hub</text>
  <text x="139" y="399" class="small">local endpoint</text>

  <rect x="90" y="455" width="230" height="74" class="cmd"/>
  <text x="132" y="488" class="text">Wait for /health</text>
  <text x="127" y="510" class="small">verify API readiness</text>

  <rect x="90" y="575" width="230" height="94" class="cmd"/>
  <text x="126" y="607" class="text">demo:bootstrap</text>
  <text x="118" y="631" class="small">mission deployment</text>
  <text x="123" y="651" class="small">mock sensor scenario</text>

  <path d="M205 279 L205 325" class="line"/>
  <path d="M205 407 L205 455" class="line"/>
  <path d="M205 529 L205 575" class="line"/>

  <rect x="395" y="135" width="345" height="790" class="band"/>
  <text x="420" y="170" class="small">2. Collect Partial Views</text>

  <rect x="430" y="205" width="275" height="76" class="sensor"/>
  <text x="490" y="238" class="text">Squad-carried sensors</text>
  <text x="462" y="260" class="small">each node sees a fragment</text>

  <rect x="415" y="330" width="135" height="78" class="sensor"/>
  <text x="455" y="362" class="text">Camera</text>
  <text x="442" y="384" class="small">visual cue</text>

  <rect x="590" y="330" width="135" height="78" class="sensor"/>
  <text x="623" y="362" class="text">Audio</text>
  <text x="608" y="384" class="small">rotor-like</text>

  <rect x="415" y="455" width="135" height="82" class="sensor"/>
  <text x="446" y="487" class="text">RF / RFID</text>
  <text x="428" y="509" class="small">location shape</text>

  <rect x="590" y="455" width="135" height="82" class="sensor"/>
  <text x="619" y="487" class="text">Operator</text>
  <text x="624" y="509" class="small">report</text>

  <rect x="430" y="610" width="275" height="96" class="mesh"/>
  <text x="477" y="642" class="text">Local edge filtering</text>
  <text x="459" y="666" class="small">rules + local LLM assist</text>
  <text x="455" y="687" class="small">send evidence, not raw streams</text>

  <path d="M320 622 C360 622 385 245 430 245" class="line"/>
  <path d="M568 281 L568 310 C525 310 483 310 483 330" class="line"/>
  <path d="M568 281 L568 310 C612 310 658 310 658 330" class="line"/>
  <path d="M483 408 L483 455" class="line"/>
  <path d="M658 408 L658 455" class="line"/>
  <path d="M483 537 C483 575 510 590 545 610" class="line"/>
  <path d="M658 537 C658 575 625 590 590 610" class="line"/>

  <rect x="780" y="135" width="325" height="790" class="band"/>
  <text x="805" y="170" class="small">3. Fuse And Review</text>

  <rect x="815" y="210" width="255" height="88" class="mesh"/>
  <text x="849" y="244" class="text">Signed evidence records</text>
  <text x="849" y="268" class="small">compact, timestamped, cited</text>

  <rect x="815" y="360" width="255" height="96" class="mesh"/>
  <text x="849" y="394" class="text">Replicated mesh ledger</text>
  <text x="847" y="418" class="small">peer gossip + store forward</text>
  <text x="875" y="439" class="small">mission state cache</text>

  <rect x="815" y="520" width="255" height="92" class="mesh"/>
  <text x="847" y="554" class="text">Coordinator election</text>
  <text x="850" y="578" class="small">current-term authority</text>
  <text x="858" y="598" class="small">leader or observe-only</text>

  <rect x="815" y="680" width="255" height="104" class="review"/>
  <text x="846" y="714" class="text">CounterUasCue queue</text>
  <text x="843" y="738" class="small">confidence, freshness, sources</text>
  <text x="860" y="759" class="small">contradictions + policy</text>

  <path d="M705 658 C748 658 760 254 815 254" class="line"/>
  <path d="M943 298 L943 360" class="line"/>
  <path d="M943 456 L943 520" class="line"/>
  <path d="M943 612 L943 680" class="line"/>

  <rect x="1145" y="135" width="200" height="790" class="band"/>
  <text x="1170" y="170" class="small">4. Operate And Reconcile</text>

  <rect x="1168" y="225" width="154" height="92" class="review"/>
  <text x="1199" y="258" class="text">Local UI</text>
  <text x="1193" y="282" class="small">human review</text>
  <text x="1194" y="302" class="small">Pi-hosted view</text>

  <polygon points="1245,385 1325,445 1245,505 1165,445" class="decision"/>
  <text x="1205" y="438" class="text">Failure?</text>
  <text x="1198" y="461" class="small">node or cloud</text>

  <rect x="1168" y="560" width="154" height="102" class="fail"/>
  <text x="1194" y="593" class="text">Recover</text>
  <text x="1184" y="617" class="small">heartbeat miss</text>
  <text x="1183" y="637" class="small">re-elect / observe</text>

  <polygon points="1245,720 1325,780 1245,840 1165,780" class="decision"/>
  <text x="1190" y="773" class="text">Uplink?</text>
  <text x="1190" y="796" class="small">secure path</text>

  <rect x="1045" y="865" width="150" height="76" class="review"/>
  <text x="1084" y="896" class="text">Queue</text>
  <text x="1069" y="918" class="small">local DDIL ops</text>

  <rect x="1235" y="865" width="150" height="76" class="review"/>
  <text x="1266" y="896" class="text">Foundry</text>
  <text x="1254" y="918" class="small">CASK sync</text>

  <path d="M1070 732 C1112 732 1135 272 1168 272" class="line"/>
  <path d="M1245 317 L1245 385" class="line"/>
  <path d="M1245 505 L1245 560" class="line"/>
  <path d="M1245 662 L1245 720" class="line"/>
  <path d="M1165 780 C1125 780 1120 825 1120 865" class="line"/>
  <path d="M1325 780 C1360 780 1330 825 1310 865" class="line"/>
  <path d="M1168 612 C1125 612 1115 300 1168 278" class="dash"/>

  <text x="1270" y="535" class="label">yes</text>
  <text x="1300" y="760" class="label">yes</text>
  <text x="1125" y="760" class="label">no</text>
  <text x="1264" y="363" class="label">no</text>

  <rect x="70" y="935" width="1260" height="1" fill="#c8cfc3"/>
  <text x="70" y="958" class="small">DDIL: Degraded, Denied, Intermittent, and Limited connectivity. The demo keeps local evidence and cueing alive without assuming cloud access.</text>
</svg>
