<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Node failure resilience</title>
  <desc id="desc">A coordinator node fails, another node is elected, and the cue queue remains available because mission state is replicated.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #f6f7f2; }
      .box { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 12; }
      .ok { fill: #eaf6ec; stroke: #2f6b3f; stroke-width: 3; rx: 12; }
      .dark { fill: #d9d9d9; stroke: #555; stroke-width: 3; rx: 12; }
      .warn { fill: #fff0cc; stroke: #775800; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #14212b; }
      .h1 { font-size: 34px; font-weight: 700; }
      .h2 { font-size: 22px; font-weight: 700; }
      .body { font-size: 18px; }
      .small { font-size: 14px; fill: #39464f; }
      .link { stroke: #2f6b3f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .bad { stroke: #b33030; stroke-width: 6; stroke-linecap: round; }
      .dash { stroke: #69757d; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="60" y="70" class="text h1">Failure moment: the coordinator dies, the mission picture survives</text>

  <rect x="80" y="155" width="230" height="135" class="dark"/>
  <text x="130" y="205" class="text h2">Node 1</text>
  <text x="130" y="237" class="text body">Coordinator</text>
  <text x="130" y="265" class="text body">DARK</text>
  <line x1="105" y1="175" x2="285" y2="270" class="bad"/>
  <line x1="285" y1="175" x2="105" y2="270" class="bad"/>

  <rect x="485" y="115" width="250" height="150" class="ok"/>
  <text x="535" y="165" class="text h2">Node 2</text>
  <text x="535" y="197" class="text body">New coordinator</text>
  <text x="535" y="225" class="text small">Has replicated state</text>

  <rect x="485" y="365" width="250" height="150" class="ok"/>
  <text x="535" y="415" class="text h2">Node 3</text>
  <text x="535" y="447" class="text body">Continues sensing</text>
  <text x="535" y="475" class="text small">Shares new evidence</text>

  <rect x="850" y="230" width="270" height="210" class="warn"/>
  <text x="895" y="280" class="text h2">Cue queue</text>
  <text x="895" y="318" class="text body">Same event</text>
  <text x="895" y="348" class="text body">Same evidence links</text>
  <text x="895" y="378" class="text body">Updated coordinator</text>
  <text x="895" y="408" class="text body">Foundry sync queued</text>

  <path d="M310 225 C385 205 425 185 485 178" class="dash"/>
  <path d="M610 265 L610 365" class="link"/>
  <path d="M735 190 C790 220 815 250 850 285" class="link"/>
  <path d="M735 440 C790 410 815 380 850 355" class="link"/>

  <rect x="80" y="535" width="1040" height="70" class="box"/>
  <text x="120" y="578" class="text body">Architectural point: mission state is replicated across peers, so node loss degrades capacity instead of destroying the operating picture.</text>
</svg>
