<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Disparate sensors with limited compute</title>
  <desc id="desc">Four squad members each carry a different sensor, while cloud connectivity is degraded and the leader has to mentally fuse the picture.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7f2; }
      .panel { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 12; }
      .node { fill: #e6f0ff; stroke: #1f4b7a; stroke-width: 2; }
      .leader { fill: #fff0cc; stroke: #775800; stroke-width: 2; }
      .cloud { fill: #f1f1f1; stroke: #666; stroke-width: 2; stroke-dasharray: 8 8; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #14212b; }
      .h1 { font-size: 34px; font-weight: 700; }
      .h2 { font-size: 22px; font-weight: 700; }
      .body { font-size: 18px; }
      .small { font-size: 15px; fill: #39464f; }
      .bad { stroke: #b33030; stroke-width: 5; stroke-linecap: round; }
      .line { stroke: #69757d; stroke-width: 3; fill: none; }
      .dash { stroke: #69757d; stroke-width: 3; fill: none; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="60" y="70" class="text h1">The problem: sensor-rich, compute-poor squads</text>
  <text x="60" y="108" class="text body">Each squad member sees one fragment. Bandwidth and compute are limited. Cloud access may be gone.</text>

  <rect x="60" y="150" width="260" height="170" class="panel"/>
  <circle cx="100" cy="205" r="28" class="node"/>
  <text x="145" y="195" class="text h2">Node A</text>
  <text x="145" y="225" class="text body">Camera cue</text>
  <text x="85" y="283" class="text small">Local compute only</text>

  <rect x="60" y="365" width="260" height="170" class="panel"/>
  <circle cx="100" cy="420" r="28" class="node"/>
  <text x="145" y="410" class="text h2">Node B</text>
  <text x="145" y="440" class="text body">Audio cue</text>
  <text x="85" y="498" class="text small">Noisy, incomplete</text>

  <rect x="440" y="150" width="260" height="170" class="panel"/>
  <circle cx="480" cy="205" r="28" class="node"/>
  <text x="525" y="195" class="text h2">Node C</text>
  <text x="525" y="225" class="text body">RF / RFID cue</text>
  <text x="465" y="283" class="text small">Small battery budget</text>

  <rect x="440" y="365" width="260" height="170" class="panel"/>
  <circle cx="480" cy="420" r="28" class="node"/>
  <text x="525" y="410" class="text h2">Node D</text>
  <text x="525" y="440" class="text body">Operator report</text>
  <text x="465" y="498" class="text small">Partial observation</text>

  <rect x="835" y="240" width="240" height="160" class="panel leader"/>
  <text x="875" y="295" class="text h2">Squad leader</text>
  <text x="865" y="330" class="text body">Mentally fuses</text>
  <text x="895" y="360" class="text body">the picture</text>

  <path d="M320 235 C370 235 390 235 440 235" class="dash"/>
  <path d="M320 450 C370 450 390 450 440 450" class="dash"/>
  <path d="M700 235 C750 250 790 275 835 300" class="dash"/>
  <path d="M700 450 C755 420 795 385 835 345" class="dash"/>
  <path d="M320 320 C480 335 665 335 835 320" class="dash"/>

  <ellipse cx="955" cy="118" rx="125" ry="45" class="cloud"/>
  <text x="893" y="125" class="text body">Cloud / HQ</text>
  <line x1="875" y1="150" x2="1035" y2="86" class="bad"/>
  <line x1="1035" y1="150" x2="875" y2="86" class="bad"/>

  <rect x="780" y="500" width="340" height="92" class="panel"/>
  <text x="810" y="535" class="text h2">Failure mode</text>
  <text x="810" y="565" class="text body">No one node has the full truth.</text>
  <text x="810" y="590" class="text body">Raw feeds cannot all go upstream.</text>
</svg>
